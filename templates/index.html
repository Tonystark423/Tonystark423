<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stark Financial Holdings LLC — Asset Ledger</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <header>
    <div class="header-inner">
      <h1>Stark Financial Holdings LLC</h1>
      <span class="subtitle">Asset Ledger</span>
    </div>
    <div class="header-actions">
      <button id="exportBtn" class="btn btn-secondary">Export CSV</button>
      <button id="addBtn" class="btn btn-primary">+ Add Asset</button>
    </div>
  </header>

  <main>
    <nav class="tab-bar">
      <button class="tab-btn active" data-tab="assets">Assets</button>
      <button class="tab-btn" data-tab="meals">Meal Planning</button>
      <button class="tab-btn" data-tab="tax">Tax Filing</button>
    </nav>

    <!-- ===== Assets Section ===== -->
    <section id="section-assets" class="tab-section">
      <div class="toolbar">
        <input type="search" id="searchInput" placeholder="Search assets…" autocomplete="off">
        <select id="categoryFilter">
          <option value="">All Categories</option>
          <option value="Proprietary IP">Proprietary IP</option>
          <option value="Computer Resources">Computer Resources</option>
          <option value="Money Market Funds">Money Market Funds</option>
          <option value="Securities &amp; Commodities">Securities &amp; Commodities</option>
          <option value="Cryptocurrency">Cryptocurrency</option>
        </select>
        <select id="statusFilter">
          <option value="">All Statuses</option>
          <option value="active">Active</option>
          <option value="pending">Pending</option>
          <option value="sold">Sold</option>
        </select>
      </div>

      <div class="table-wrap">
        <table id="assetsTable">
          <thead>
            <tr>
              <th>Name</th>
              <th>Category</th>
              <th>Subcategory</th>
              <th>Value (USD)</th>
              <th>Quantity</th>
              <th>Custodian</th>
              <th>Status</th>
              <th>Acquired</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="assetsBody">
            <tr><td colspan="9" class="empty">Loading…</td></tr>
          </tbody>
        </table>
      </div>
    </section>

    <!-- ===== Meal Planning Section ===== -->
    <section id="section-meals" class="tab-section hidden">
      <div class="toolbar">
        <button id="addMealBtn" class="btn btn-primary">+ Add Meal</button>
        <button id="suggestMealBtn" class="btn btn-secondary">What can we eat?</button>
        <select id="mealCategoryFilter">
          <option value="">All Categories</option>
          <option value="business">Business</option>
          <option value="personal">Personal</option>
          <option value="general">General</option>
        </select>
      </div>

      <div id="mealBudgetBanner" class="budget-banner hidden"></div>

      <div class="table-wrap">
        <table id="mealsTable">
          <thead>
            <tr>
              <th>Name</th>
              <th>Cuisine</th>
              <th>Category</th>
              <th>Est. Cost (USD)</th>
              <th>Notes</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="mealsBody">
            <tr><td colspan="6" class="empty">Loading…</td></tr>
          </tbody>
        </table>
      </div>
    </section>

    <!-- ===== Tax Filing Section ===== -->
    <section id="section-tax" class="tab-section hidden">
      <div class="toolbar">
        <button id="refreshTaxBtn" class="btn btn-secondary">Refresh Summary</button>
        <button id="fileTaxBtn" class="btn btn-primary">Download Tax Filing</button>
      </div>
      <div id="taxSummaryContent">
        <p class="empty" style="padding:40px 0;">Click <strong>Refresh Summary</strong> to compute your tax summary.</p>
      </div>
    </section>
  </main>

  <!-- ===== Asset Modal ===== -->
  <div id="modal" class="modal hidden" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
    <div class="modal-backdrop"></div>
    <div class="modal-box">
      <h2 id="modalTitle">Add Asset</h2>
      <form id="assetForm" novalidate>
        <input type="hidden" id="assetId">

        <div class="form-row">
          <div class="form-group">
            <label for="f_asset_name">Asset Name <span class="req">*</span></label>
            <input type="text" id="f_asset_name" name="asset_name" required>
          </div>
          <div class="form-group">
            <label for="f_category">Category <span class="req">*</span></label>
            <select id="f_category" name="category" required>
              <option value="">Select…</option>
              <option value="Proprietary IP">Proprietary IP</option>
              <option value="Computer Resources">Computer Resources</option>
              <option value="Money Market Funds">Money Market Funds</option>
              <option value="Securities &amp; Commodities">Securities &amp; Commodities</option>
              <option value="Cryptocurrency">Cryptocurrency</option>
            </select>
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="f_subcategory">Subcategory</label>
            <input type="text" id="f_subcategory" name="subcategory" placeholder="e.g. Patent, Algorithm, SPAXX, HBM4">
          </div>
          <div class="form-group">
            <label for="f_status">Status</label>
            <select id="f_status" name="status">
              <option value="active">Active</option>
              <option value="pending">Pending</option>
              <option value="sold">Sold</option>
            </select>
          </div>
        </div>

        <div class="form-group full">
          <label for="f_description">Description</label>
          <textarea id="f_description" name="description" rows="2"></textarea>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="f_quantity">Quantity</label>
            <input type="number" id="f_quantity" name="quantity" step="any">
          </div>
          <div class="form-group">
            <label for="f_unit">Unit</label>
            <input type="text" id="f_unit" name="unit" placeholder="e.g. shares, BTC, TB">
          </div>
          <div class="form-group">
            <label for="f_estimated_value">Estimated Value (USD)</label>
            <input type="number" id="f_estimated_value" name="estimated_value" step="any" min="0">
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="f_acquisition_date">Acquisition Date</label>
            <input type="date" id="f_acquisition_date" name="acquisition_date">
          </div>
          <div class="form-group">
            <label for="f_custodian">Custodian / Institution</label>
            <input type="text" id="f_custodian" name="custodian" placeholder="e.g. Fidelity, Coinbase">
          </div>
        </div>

        <div class="form-group full">
          <label for="f_beneficial_owner">Beneficial Owner</label>
          <input type="text" id="f_beneficial_owner" name="beneficial_owner">
        </div>

        <div class="form-group full">
          <label for="f_notes">Notes</label>
          <textarea id="f_notes" name="notes" rows="2"></textarea>
        </div>

        <div id="formError" class="form-error hidden"></div>

        <div class="modal-footer">
          <button type="button" id="cancelBtn" class="btn btn-secondary">Cancel</button>
          <button type="submit" id="saveBtn" class="btn btn-primary">Save</button>
        </div>
      </form>
    </div>
  </div>

  <!-- ===== Meal Modal ===== -->
  <div id="mealModal" class="modal hidden" role="dialog" aria-modal="true" aria-labelledby="mealModalTitle">
    <div class="modal-backdrop" id="mealModalBackdrop"></div>
    <div class="modal-box">
      <h2 id="mealModalTitle">Add Meal</h2>
      <form id="mealForm" novalidate>
        <input type="hidden" id="mealId">

        <div class="form-row">
          <div class="form-group">
            <label for="fm_name">Meal Name <span class="req">*</span></label>
            <input type="text" id="fm_name" name="name" required>
          </div>
          <div class="form-group">
            <label for="fm_meal_category">Category</label>
            <select id="fm_meal_category" name="meal_category">
              <option value="general">General</option>
              <option value="business">Business</option>
              <option value="personal">Personal</option>
            </select>
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="fm_cuisine_type">Cuisine</label>
            <input type="text" id="fm_cuisine_type" name="cuisine_type" placeholder="e.g. Italian, Japanese">
          </div>
          <div class="form-group">
            <label for="fm_estimated_cost">Estimated Cost (USD)</label>
            <input type="number" id="fm_estimated_cost" name="estimated_cost" step="any" min="0">
          </div>
        </div>

        <div class="form-group full">
          <label for="fm_description">Description</label>
          <textarea id="fm_description" name="description" rows="2"></textarea>
        </div>

        <div class="form-group full">
          <label for="fm_notes">Notes</label>
          <textarea id="fm_notes" name="notes" rows="2"></textarea>
        </div>

        <div id="mealFormError" class="form-error hidden"></div>

        <div class="modal-footer">
          <button type="button" id="cancelMealBtn" class="btn btn-secondary">Cancel</button>
          <button type="submit" id="saveMealBtn" class="btn btn-primary">Save</button>
        </div>
      </form>
    </div>
  </div>

  <script src="/static/app.js"></script>
</body>
</html>
