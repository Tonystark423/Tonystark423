# This is a basic workflow to help you get started with Actions

name: CI

# Controls when the workflow will run
on:
  # Triggers the workflow on push or pull request events but only for the "main" branch
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  # This workflow contains a single job called "build"
  build:
    # The type of runner that the job will run on
    runs-on: ubuntu-latest

    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:
      - uses: actions/checkout@v4

      - name: Install actionlint
        run: |
          bash <(curl -s https://raw.githubusercontent.com/rhysd/actionlint/main/scripts/download-actionlint.bash)

      - name: Lint GitHub Actions workflows
        run: ./actionlint -color

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests with coverage
        run: pytest tests/ -v --cov=app --cov-report=term-missing --cov-fail-under=80

      - name: Assertion Density Quality Gate
        # Integration tests have more setup code than unit tests, so the
        # per-function threshold is lower. The hard rules are:
        #   1. No test function may have 0 assertions (vanity test)
        #   2. Overall file density must stay above 0.08
        # Use --min-density 0.5 only for pure unit test suites.
        run: python scripts/check_assertion_density.py --min-density 0.08 tests/
